  required_for_p5_smoke:
    - server_startup_status
    - health_endpoint_ready
    - per_context_request_status
    - fixed_generated_tokens
    - ttft_tpot_e2e_client_timing
    - server_command
    - server_stats_log_summary
    - npu_hbm_used_free_snapshot
    - failure_reason_and_artifact_path
  deferred_until_p6:
