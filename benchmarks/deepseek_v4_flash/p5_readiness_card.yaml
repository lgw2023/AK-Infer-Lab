boundaries:
  - The project has retired the W8A8 checkpoint from future execution, but retains its inventory as historical evidence.
  - The official DeepSeek checkpoint is mixed FP8 plus FP4 experts, not pure FP8.
  - Installed-content provenance matched the target tags and the complete official plugin list selected the Ascend DeepSeekV4 model plus memory redirects without an overlay.
  - The latest task then unset PYTHONPATH after sourcing CANN and ATB, and all workers failed importing acl before weight load.
  - The next task rebuilds PYTHONPATH from a clean shell using only the official CANN and ATB set_env scripts, verifies acl origin and spawn inheritance, then conditionally retries the same four-card base.
  - Four-card success does not authorize the future eight-card context ladder or P6 benchmark.
  - Raw logs and large artifacts remain on the server.
