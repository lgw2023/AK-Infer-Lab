  yellow: startup_and_some_inference_success_but_degraded_or_below_131072
  red: no_8card_startup_or_no_successful_request
boundaries:
  - P5 is now an eight-card DeepSeek-V4-Flash startup and long-context smoke, not metadata-only readiness.
  - P5 is still not a benchmark and must not produce bottleneck or optimization-benefit claims.
  - The Hugging Face source checkpoint is metadata/source evidence only for this round.
  - If any official startup flag is removed or max_num_seqs is lowered, the result is degraded_smoke.
  - Raw logs, generated text, profiler output and large artifacts remain on the server.
acceptance:
