boundaries:
  - W8A8 is the only selected DeepSeek-V4-Flash runtime object for the current P5 and future P6 execution.
  - The 279.41 GiB W8A8 checkpoint cannot be tested as a full model in the retired four-card scope; the current task uses all eight authorized devices.
  - The mixed checkpoint remains historical evidence and will not receive an adapter or conversion effort.
  - The completed P5 task validates only one no-MTP 4096+64 graph request; it is a degraded runtime baseline, not the official MTP/128K target.
  - P6.0 completed with two new identical lifecycle successes and grade yellow_degraded_baseline_stabilized.
  - P6.1 minimal control completed with one warmup and three measured 4096+64+c1 requests, grade yellow_degraded_minimal_unprofiled_control_measured.
  - The first P6.1R attempt stopped blocked_repo before overlay because its prior-evidence path did not exist; all substantive root-cause and hash gates passed and patch/lifecycle/request counts remained 0/0/0.
  - P6.1R retry1 applied the one-line overlay, reached server-ready and removed the original positions_cpu graph-capture failure; its only request returned HTTP 400 because the completion payload was sent to the chat endpoint.
  - P6.1R retry2 completed the minimal MTP 4096+64 request with exact token checks and clean cleanup; P6.1L-R1 then revalidated all six 4096+512/1024 slots without retries.
  - P6.1C completed as blocked_sampling_calibration after npu-smi info -t usages returned only a missing-card-id help message for all 36 sweeps; two 65536+64 calibration requests were summary-reported successful, but they are not official context evidence and the official lifecycle never started.
  - P6.1C-R1 completed as green_mtp_official_context_ladder: calibration selected 5.0s, the unchanged 4096/32768/65536/98304/131072+64 ladder passed on every first attempt, highest_stable_context=131072 and the developer accepted the official functional/capacity/stability reference baseline.
  - P6.1 MTP unprofiled baseline completed as green_mtp_unprofiled_baseline: 90/90 measured requests, 24/24 measured batches and 18/18 cells succeeded without retry, so the performance reference baseline is accepted.
  - P6.2 MTP profiled evidence completed as green_mtp_profiled_evidence: all three representative cells succeeded on the first attempt, each produced a clean msprof SQLite root and full request-device aggregate, and all six phase-memory rows had eight-device coverage without parse failures.
  - P6.3A matched MTP on/off completed as green_p6_3a_mtp_matched_ab: all 48 measured batches and 108 measured requests succeeded, and all 24 paired batches had directionally consistent E2EL, TPOT and batch-throughput differences within the fixed-order workload.
  - P6.3B Prefix Cache on/off completed as yellow_p6_3b_prefix_cache_matched_ab_partial: all 64 HTTP/token/MTP requests completed, but all 24 Prefix-on measured followers had zero hit delta despite positive query deltas.
  - P6.3B-R1 ended red before server ready because eager sitecustomize import preceded Ascend spec replacement; it dispatched 0 requests and therefore does not test the Prefix Cache repair mechanism.
  - P6.3B-R2 completed as green_p6_3b_r2_hybrid_kv_repair: the deferred same R2 repair produced 3/3 prime, 9/9 measured and 9/9 positive-hit followers with complete hybrid diagnostics and clean cleanup; it does not claim matched performance effect.
  - P6.3B-R3 completed as yellow invalid-control evidence: both modes loaded the same R2 repair and both effectively ran Prefix Cache on because the off side omitted the negative flag and inherited the vLLM default true.
  - P6.3B-R4 stopped before vLLM launch because cp -a could not preserve ownership on the new root-squashed NFS mount; its 0/64 blocked result is not Prefix Cache or hybrid-KV mechanism evidence.
  - P6.3B-R4-R1 completed as green_p6_3b_r4_r1_explicit_prefix_cache_matched_ab: all 64 requests succeeded, explicit Prefix Cache off produced zero hits, and the three primary on groups produced 9/9 positive hits exactly aligned to the 16K hybrid LCM under the same R2 repair.
  - The fifteen boundary followers still produced zero hits, so R4-R1 proves an explicit Prefix Cache mechanism effect for the primary groups but does not establish universal repeated-prefix hits or a general performance benefit.
